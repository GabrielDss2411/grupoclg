<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 420" preserveAspectRatio="xMidYMid slice" font-family="'Schibsted Grotesk',Segoe UI,sans-serif">
  <defs>
    <linearGradient id="aud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C1A57"/>
      <stop offset="1" stop-color="#070E33"/>
    </linearGradient>
    <linearGradient id="audgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D171"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="audspot" cx="0.5" cy="-0.1" r="0.7">
      <stop offset="0" stop-color="#E9C65A" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#E9C65A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="audscreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16276A"/>
      <stop offset="1" stop-color="#0B1440"/>
    </linearGradient>
  </defs>
  <rect width="1160" height="420" fill="url(#aud)"/>
  <rect width="1160" height="420" fill="url(#audspot)"/>

  <!-- spotlight beams -->
  <path d="M580 0 L470 220 L690 220 Z" fill="#E9C65A" opacity="0.05"/>

  <!-- stage screen -->
  <rect x="410" y="46" width="340" height="180" rx="12" fill="url(#audscreen)" stroke="#2E3E78" stroke-width="1.5"/>
  <g transform="translate(580,120)">
    <rect x="-34" y="-34" width="68" height="52" rx="12" fill="#12235F" stroke="#E9C65A" stroke-width="2"/>
    <text x="0" y="8" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">CLG</text>
    <rect x="-18" y="30" width="36" height="4" rx="2" fill="url(#audgold)"/>
  </g>

  <!-- stage floor -->
  <rect x="360" y="236" width="440" height="8" rx="4" fill="#1A2A5E"/>
  <!-- podium -->
  <rect x="470" y="244" width="36" height="52" rx="6" fill="#1C2C60"/>
  <ellipse cx="488" cy="230" rx="12" ry="13" fill="#33487F"/>

  <!-- audience rows (curved) -->
  <g fill="#16255C">
    <g>
      <circle cx="330" cy="300" r="15"/><circle cx="392" cy="300" r="15"/><circle cx="454" cy="300" r="15"/><circle cx="580" cy="300" r="15"/><circle cx="706" cy="300" r="15"/><circle cx="768" cy="300" r="15"/><circle cx="830" cy="300" r="15"/><circle cx="516" cy="300" r="15"/><circle cx="642" cy="300" r="15"/>
    </g>
  </g>
  <g fill="#1E2E64">
    <circle cx="290" cy="348" r="17"/><circle cx="360" cy="348" r="17"/><circle cx="430" cy="348" r="17"/><circle cx="500" cy="348" r="17"/><circle cx="580" cy="348" r="17"/><circle cx="660" cy="348" r="17"/><circle cx="730" cy="348" r="17"/><circle cx="800" cy="348" r="17"/><circle cx="870" cy="348" r="17"/>
  </g>
  <g fill="#26386F">
    <circle cx="250" cy="404" r="19"/><circle cx="330" cy="404" r="19"/><circle cx="410" cy="404" r="19"/><circle cx="490" cy="404" r="19"/><circle cx="580" cy="404" r="19"/><circle cx="670" cy="404" r="19"/><circle cx="750" cy="404" r="19"/><circle cx="830" cy="404" r="19"/><circle cx="910" cy="404" r="19"/>
  </g>

  <!-- side accent dots -->
  <circle cx="150" cy="120" r="3" fill="#E9C65A" opacity="0.5"/>
  <circle cx="1010" cy="90" r="3" fill="#E9C65A" opacity="0.5"/>
  <circle cx="1060" cy="170" r="2.5" fill="#8FA0D8" opacity="0.5"/>
</svg>
