<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" preserveAspectRatio="xMidYMid slice" font-family="'Schibsted Grotesk',Segoe UI,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C1A57"/>
      <stop offset="1" stop-color="#070E33"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.2" cy="0.85" r="0.8">
      <stop offset="0" stop-color="#294296" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#294296" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D171"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
  </defs>
  <rect width="640" height="380" fill="url(#bg2)"/>
  <rect width="640" height="380" fill="url(#glow2)"/>

  <!-- back sheets -->
  <g transform="rotate(-7 320 200)">
    <rect x="196" y="66" width="248" height="300" rx="10" fill="#1A254E" opacity="0.55"/>
  </g>
  <g transform="rotate(-3 320 200)">
    <rect x="204" y="58" width="248" height="300" rx="10" fill="#25316A" opacity="0.7"/>
  </g>

  <!-- top sheet -->
  <g transform="rotate(2 320 200)">
    <rect x="200" y="52" width="256" height="308" rx="12" fill="#F7F5EE"/>
    <!-- header band -->
    <rect x="200" y="52" width="256" height="66" rx="12" fill="#0C1A57"/>
    <rect x="200" y="96" width="256" height="22" fill="#0C1A57"/>
    <rect x="222" y="70" width="120" height="9" rx="4.5" fill="#E9C65A"/>
    <rect x="222" y="86" width="80" height="7" rx="3.5" fill="#8FA0D8"/>
    <!-- TCU tag -->
    <rect x="392" y="72" width="42" height="20" rx="10" fill="#E9C65A"/>
    <text x="413" y="86" font-size="11" font-weight="700" fill="#0A1236" text-anchor="middle">TCU</text>

    <!-- section title -->
    <rect x="222" y="140" width="150" height="10" rx="5" fill="#0C1A57"/>
    <!-- text lines -->
    <rect x="222" y="164" width="212" height="6" rx="3" fill="#C7C2B0"/>
    <rect x="222" y="178" width="212" height="6" rx="3" fill="#C7C2B0"/>
    <rect x="222" y="192" width="176" height="6" rx="3" fill="#C7C2B0"/>

    <rect x="222" y="220" width="120" height="9" rx="4.5" fill="#0C1A57"/>
    <rect x="222" y="240" width="212" height="6" rx="3" fill="#C7C2B0"/>
    <rect x="222" y="254" width="212" height="6" rx="3" fill="#C7C2B0"/>
    <rect x="222" y="268" width="150" height="6" rx="3" fill="#C7C2B0"/>

    <!-- seal -->
    <circle cx="410" cy="300" r="30" fill="none" stroke="url(#gold2)" stroke-width="2"/>
    <circle cx="410" cy="300" r="22" fill="url(#gold2)"/>
    <text x="410" y="311" font-family="'Newsreader',Georgia,serif" font-style="italic" font-size="26" font-weight="600" fill="#0A1236" text-anchor="middle">§</text>
    <rect x="222" y="292" width="120" height="6" rx="3" fill="#C7C2B0"/>
    <rect x="222" y="306" width="90" height="6" rx="3" fill="#C7C2B0"/>
  </g>
</svg>
