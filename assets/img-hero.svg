<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" preserveAspectRatio="xMidYMid slice" font-family="'Schibsted Grotesk',Segoe UI,sans-serif">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12235F"/>
      <stop offset="1" stop-color="#0A1236"/>
    </linearGradient>
    <radialGradient id="hglow" cx="0.55" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#E9C65A" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#3A56A8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#3A56A8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D171"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="hcard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A2C6B"/>
      <stop offset="1" stop-color="#0C1740"/>
    </linearGradient>
  </defs>
  <rect width="600" height="500" fill="url(#hbg)"/>
  <rect width="600" height="500" fill="url(#hglow)"/>

  <!-- orbit rings -->
  <circle cx="300" cy="250" r="180" fill="none" stroke="#E9C65A" stroke-opacity="0.1" stroke-width="1.5"/>
  <circle cx="300" cy="250" r="130" fill="none" stroke="#8FA0D8" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- satellite chips -->
  <g transform="rotate(-8 180 150)">
    <rect x="120" y="110" width="120" height="80" rx="16" fill="url(#hcard)" stroke="#2E3E78" stroke-width="1"/>
    <rect x="138" y="160" width="70" height="8" rx="4" fill="#B9C4E6"/>
    <rect x="138" y="128" width="24" height="24" rx="7" fill="#2A3F86"/>
  </g>
  <g transform="rotate(9 430 170)">
    <rect x="372" y="120" width="120" height="80" rx="16" fill="url(#hcard)" stroke="#2E3E78" stroke-width="1"/>
    <rect x="390" y="170" width="60" height="8" rx="4" fill="#B9C4E6"/>
    <rect x="390" y="138" width="24" height="24" rx="7" fill="#C9A227"/>
  </g>
  <g transform="rotate(7 170 370)">
    <rect x="112" y="330" width="120" height="80" rx="16" fill="url(#hcard)" stroke="#2E3E78" stroke-width="1"/>
    <rect x="130" y="380" width="66" height="8" rx="4" fill="#B9C4E6"/>
    <rect x="130" y="348" width="24" height="24" rx="7" fill="#2A3F86"/>
  </g>
  <g transform="rotate(-10 440 360)">
    <rect x="380" y="322" width="120" height="80" rx="16" fill="url(#hcard)" stroke="#2E3E78" stroke-width="1"/>
    <rect x="398" y="372" width="54" height="8" rx="4" fill="#B9C4E6"/>
    <rect x="398" y="340" width="24" height="24" rx="7" fill="#2A3F86"/>
  </g>

  <!-- center CLG card -->
  <g>
    <rect x="228" y="178" width="144" height="144" rx="26" fill="url(#hcard)" stroke="#E9C65A" stroke-opacity="0.5" stroke-width="2"/>
    <text x="300" y="258" font-family="Georgia,serif" font-size="46" font-weight="700" fill="#ffffff" text-anchor="middle">CLG</text>
    <rect x="276" y="284" width="48" height="6" rx="3" fill="url(#hgold)"/>
  </g>

  <!-- sparkles -->
  <circle cx="300" cy="70" r="3" fill="#E9C65A" opacity="0.7"/>
  <circle cx="500" cy="250" r="2.5" fill="#8FA0D8" opacity="0.6"/>
  <circle cx="110" cy="250" r="2.5" fill="#8FA0D8" opacity="0.6"/>
  <circle cx="300" cy="440" r="3" fill="#E9C65A" opacity="0.6"/>
</svg>
