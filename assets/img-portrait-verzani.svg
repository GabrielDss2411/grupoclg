<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#122258"/>
      <stop offset="1" stop-color="#070E33"/>
    </linearGradient>
    <radialGradient id="pglow" cx="0.72" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#E9C65A" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#2A3F86" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#2A3F86" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pfig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26386F"/>
      <stop offset="1" stop-color="#101B45"/>
    </linearGradient>
    <linearGradient id="prim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E9C65A" stop-opacity="0.85"/>
      <stop offset="0.16" stop-color="#E9C65A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pgoldtie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0D171"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
  </defs>
  <rect width="480" height="560" fill="url(#pbg)"/>
  <rect width="480" height="560" fill="url(#pglow)"/>

  <!-- soft ring -->
  <circle cx="240" cy="230" r="150" fill="none" stroke="#E9C65A" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- bust group -->
  <g>
    <!-- shoulders / suit -->
    <path d="M60 560 C64 430 130 372 240 372 C350 372 416 430 420 560 Z" fill="url(#pfig)"/>
    <!-- collar -->
    <path d="M196 386 L240 470 L284 386 L262 378 L240 430 L218 378 Z" fill="#0C1637"/>
    <!-- shirt -->
    <path d="M214 380 L240 452 L266 380 L256 376 L240 300 L224 376 Z" fill="#1A2A5E"/>
    <!-- tie -->
    <path d="M240 400 L230 430 L240 470 L250 430 Z" fill="url(#pgoldtie)" opacity="0.9"/>
    <path d="M234 396 L246 396 L243 408 L237 408 Z" fill="url(#pgoldtie)"/>
    <!-- neck -->
    <rect x="216" y="300" width="48" height="80" rx="22" fill="#223564"/>
    <!-- head -->
    <ellipse cx="240" cy="216" rx="80" ry="92" fill="url(#pfig)"/>
    <!-- hair -->
    <path d="M162 208 C160 150 196 118 240 118 C284 118 320 150 318 208 C318 176 300 150 262 150 C214 150 176 168 162 208 Z" fill="#0C1637"/>
    <!-- rim light -->
    <rect width="480" height="560" fill="url(#prim)"/>
  </g>
</svg>
