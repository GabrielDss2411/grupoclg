<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" preserveAspectRatio="xMidYMid slice" font-family="'Schibsted Grotesk',Segoe UI,sans-serif">
  <defs>
    <linearGradient id="icbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#132456"/>
      <stop offset="1" stop-color="#0A1338"/>
    </linearGradient>
    <linearGradient id="icgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D171"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="icspot" cx="0.3" cy="0" r="0.9">
      <stop offset="0" stop-color="#E9C65A" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#E9C65A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="300" rx="18" fill="url(#icbg)"/>
  <rect width="560" height="300" rx="18" fill="url(#icspot)"/>

  <!-- presentation screen -->
  <rect x="40" y="42" width="240" height="150" rx="10" fill="#0C1637" stroke="#2A3A72" stroke-width="1.5"/>
  <rect x="58" y="60" width="120" height="12" rx="6" fill="url(#icgold)"/>
  <rect x="58" y="82" width="180" height="7" rx="3.5" fill="#3D4E86"/>
  <rect x="58" y="96" width="150" height="7" rx="3.5" fill="#33427A"/>
  <!-- mini bar chart -->
  <rect x="58" y="150" width="20" height="26" rx="3" fill="#2A3F86"/>
  <rect x="84" y="136" width="20" height="40" rx="3" fill="#3A56A8"/>
  <rect x="110" y="122" width="20" height="54" rx="3" fill="url(#icgold)"/>
  <rect x="136" y="144" width="20" height="32" rx="3" fill="#2A3F86"/>
  <!-- stand -->
  <rect x="156" y="192" width="8" height="18" fill="#2A3A72"/>

  <!-- presenter -->
  <g>
    <ellipse cx="330" cy="120" rx="20" ry="22" fill="#33487F"/>
    <path d="M300 210 C302 168 314 150 330 150 C346 150 358 168 360 210 Z" fill="#2A3F86"/>
    <path d="M330 168 L318 190 M330 168 L346 186" stroke="#4A5893" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- audience (rows of seats) -->
  <g fill="#20305F">
    <circle cx="410" cy="150" r="15"/><circle cx="452" cy="150" r="15"/><circle cx="494" cy="150" r="15"/>
    <circle cx="392" cy="196" r="16"/><circle cx="436" cy="196" r="16"/><circle cx="480" cy="196" r="16"/><circle cx="524" cy="196" r="16"/>
  </g>
  <g fill="#2A3F86">
    <rect x="396" y="162" width="28" height="26" rx="8"/><rect x="438" y="162" width="28" height="26" rx="8"/><rect x="480" y="162" width="28" height="26" rx="8"/>
    <rect x="376" y="210" width="32" height="30" rx="9"/><rect x="420" y="210" width="32" height="30" rx="9"/><rect x="464" y="210" width="32" height="30" rx="9"/><rect x="508" y="210" width="32" height="30" rx="9"/>
  </g>

  <!-- floor line -->
  <rect x="40" y="250" width="480" height="2" rx="1" fill="#26356F" opacity="0.6"/>
</svg>
